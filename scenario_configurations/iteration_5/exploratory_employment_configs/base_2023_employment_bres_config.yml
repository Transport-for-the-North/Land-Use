# Configuration file specifying the segmentation and geographical level of the input data.
# All files here are assumed to be in a format ready for DVectors.
input_root_directory: I:\NorMITs Land Use\2023\import
output_directory: F:\Working\Land-Use\OUTPUTS_base_employment_bres_2023_approach_a_weighting_2
output_intermediate_outputs: False
adjust_for_farmers: True

base_data:
    lad_raw_4_digit_sic:
        file_path: BRES2023\Employment\preprocessing\bres_employment23_lad2011_4digit_sic.hdf
        geographical_level: LAD2021+SCOTLANDLAD
        input_segments: [sic_4_digit]

    msoa_raw_2_digit_sic:
        file_path: BRES2023\Employment\preprocessing\bres_employment23_msoa2011_2digit_sic_jobs.hdf
        geographical_level: MSOA2011+SCOTLAND-INT-ZONE
        input_segments: [sic_2_digit]

    lsoa_raw_1_digit_sic:
        file_path: BRES2023\Employment\preprocessing\bres_employment23_lsoa2011_1digit_sic.hdf
        geographical_level: DZ2011+LSOA2011
        input_segments: [sic_1_digit]

    ons_sic_soc_jobs_lu:
        file_path: ONS\industry_occupation\preprocessing\population_region_1sic_soc.hdf
        geographical_level: RGN2021+SCOTLANDRGN
        input_segments: [sic_1_digit, soc]

    # Note this remains as BRES2022
    wfj:
        file_path: BRES2022\Employment\Employment Investigation\preprocessing\WFJ.hdf
        geographical_level: RGN2021+SCOTLANDRGN
        input_segments: [total]

    soc_4_factors:
        file_path: SOC\preprocessing\Table 8 WFJ-adjusted Land Use SOC4.hdf
        geographical_level: RGN2021+SCOTLANDRGN
        input_segments: [total]

    employment_lsoa_distribution_factors:
        file_path: Employment Attraction Distributions\sic mapped distributions\preprocessing\factors_approach_a_weighting_2.hdf
        geographical_level: DZ2011+LSOA2021
        input_segments: [sic_1_digit]
